[build]
  base = "."
  command = "npm run build"
  publish = "web/dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev:web"
  targetPort = 5173
  port = 8888
  publish = "web/dist"

[functions]
  node_bundler = "esbuild"
  # Bundle shared + function files together
  included_files = ["shared/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
