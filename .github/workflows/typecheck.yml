name: Typecheck

# Catch TypeScript errors before they land on main. Each workspace
# checks independently so a worker error doesn't mask a web error.

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "worker/**"
      - "netlify/functions/**"
      - "shared/**"
      - "desktop/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "worker/**"
      - "netlify/functions/**"
      - "shared/**"
      - "desktop/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspaces:
    name: ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: web
            dir: web
          - workspace: worker
            dir: worker
          - workspace: functions
            dir: netlify/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install root deps (workspaces)
        run: npm ci
      - name: Typecheck ${{ matrix.workspace }}
        working-directory: ${{ matrix.dir }}
        run: npx tsc --noEmit

  desktop:
    # Desktop has its own package.json (not a workspace; ffmpeg-static
    # alone is ~100 MB and shouldn't bloat the root install).
    name: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund
      - name: Typecheck desktop
        working-directory: desktop
        run: npx tsc --noEmit
