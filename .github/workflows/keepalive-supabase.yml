name: Supabase Keep-Alive

# Supabase free-tier projects pause after 7 days of inactivity.
# A weekly no-op query keeps the instance warm.

on:
  schedule:
    - cron: "0 12 * * 1"  # every Monday 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -fsS \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/videos?select=id&limit=1" \
            > /dev/null
