name: Deploy web

# Replaces Netlify's built-in Git auto-deploy: build the SPA in CI, push the
# bundle to Netlify production via the CLI. Triggers on every push to main
# that touches frontend or shared code, plus manual dispatch for ad-hoc redeploys.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

# Only the latest commit on main needs to be live — cancel earlier runs in flight.
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build web bundle
        run: npm --workspace web run build

      # nwtgck/actions-netlify@v3 doesn't run netlify-cli's function bundler,
      # so it ships .ts sources as-is and Netlify drops them — every deploy
      # via that action stripped all 16 functions. netlify-cli@26 added a
      # workspace-detection prompt at the repo root that breaks
      # non-interactive use, BUT it works fine when invoked from web/
      # (no netlify.toml visible to confuse it; --dir + --functions point
      # at absolute paths that Netlify resolves through the repo's
      # netlify.toml).
      - name: Deploy to Netlify production
        working-directory: web
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npx --yes netlify-cli@latest deploy \
            --prod \
            --no-build \
            --dir="${GITHUB_WORKSPACE}/web/dist" \
            --functions="${GITHUB_WORKSPACE}/netlify/functions" \
            --site="${{ secrets.NETLIFY_SITE_ID }}" \
            --message="GHA deploy from ${{ github.sha }}"
        timeout-minutes: 10
