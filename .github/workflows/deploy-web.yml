name: Deploy web

# Replaces Netlify's built-in Git auto-deploy: build the SPA in CI, push the
# bundle to Netlify production via the CLI. Triggers on every push to main
# that touches frontend or shared code, plus manual dispatch for ad-hoc redeploys.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

# Only the latest commit on main needs to be live — cancel earlier runs in flight.
concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build web bundle
        run: npm --workspace web run build

      # Use the dedicated action; netlify-cli@26 errors out at the repo root
      # when it detects npm workspaces and refuses to deploy without an
      # explicit project selection. The action talks to the deploy API
      # directly and avoids that prompt.
      - name: Deploy to Netlify production
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: web/dist
          production-deploy: true
          deploy-message: "GHA deploy from ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
